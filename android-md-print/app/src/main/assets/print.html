<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=384, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        packages: {'[+]': ['ams', 'boldsymbol', 'braket', 'cancel', 'color', 'configmacros', 'html', 'mathtools', 'mhchem', 'newcommand', 'physics', 'unicode']}
      },
      loader: {
        load: ['[tex]/ams', '[tex]/boldsymbol', '[tex]/braket', '[tex]/cancel', '[tex]/color', '[tex]/configmacros', '[tex]/html', '[tex]/mathtools', '[tex]/mhchem', '[tex]/newcommand', '[tex]/physics', '[tex]/unicode']
      },
      svg: {
        fontCache: 'none'
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script src="mathjax-tex-svg-full.js"></script>
  <script src="markdown-it.min.js"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 384px;
      min-height: 1px;
      background: #fff;
      color: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans", "Noto Sans CJK SC", sans-serif;
      font-size: 19px;
      line-height: 1.22;
      -webkit-text-size-adjust: 100%;
    }

    #content {
      box-sizing: border-box;
      width: 384px;
      padding: 10px 18px 8px;
      overflow: visible;
    }

    #content > :first-child { margin-top: 0; }
    #content > :last-child { margin-bottom: 0; }

    h1, h2, h3, h4, h5, h6 {
      margin: 0.55em 0 0.35em;
      line-height: 1.16;
      font-weight: 700;
      border: 0;
    }

    h1 { font-size: 1.55em; }
    h2 { font-size: 1.32em; }
    h3 { font-size: 1.16em; }
    h4 { font-size: 1.05em; }
    h5 { font-size: 1em; }
    h6 { font-size: 0.95em; }

    p,
    ul,
    ol,
    blockquote,
    pre,
    table {
      margin: 0 0 0.62em;
    }

    ul,
    ol {
      padding-left: 1.35em;
    }

    li {
      margin: 0.12em 0;
    }

    blockquote {
      border-left: 4px solid #000;
      padding-left: 0.6em;
    }

    code,
    pre {
      font-family: "Droid Sans Mono", "Noto Mono", monospace;
      font-size: 0.88em;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #000;
      padding: 0.5em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      font-size: 0.82em;
      line-height: 1.18;
      page-break-inside: avoid;
    }

    th,
    td {
      border: 2px solid #000;
      padding: 5px;
      vertical-align: top;
      word-break: normal;
      overflow-wrap: break-word;
    }

    th {
      font-weight: 700;
    }

    th > :last-child,
    td > :last-child {
      margin-bottom: 0;
    }

    .math-cell {
      text-align: center;
      vertical-align: middle;
    }

    .stack-table {
      margin: 0 0 0.72em;
      border-top: 2px solid #000;
      font-size: 0.9em;
    }

    .stack-row {
      border-left: 2px solid #000;
      border-right: 2px solid #000;
      border-bottom: 2px solid #000;
      padding: 2px 0;
      page-break-inside: avoid;
    }

    .stack-field {
      display: block;
      padding: 4px 6px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .stack-key {
      font-weight: 700;
    }

    hr {
      height: 2px;
      margin: 0.8em 0;
      border: 0;
      background: #000;
    }

    a {
      color: #000;
      text-decoration: underline;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      filter: grayscale(1) contrast(1.2);
    }

    .align-left { text-align: left; }
    .align-center { text-align: center; }
    .align-right { text-align: right; }
    .align-justify {
      text-align: justify;
      text-align-last: auto;
    }

    .font-sm { font-size: 0.84em; }
    .font-md { font-size: 1em; }
    .font-lg { font-size: 1.2em; }
    .font-xl { font-size: 1.42em; }

    mark {
      padding: 0 0.12em;
      color: #000;
      background: #ddd;
    }

    .footnotes {
      margin-top: 0.8em;
      padding-top: 0.45em;
      border-top: 1px solid #000;
      font-size: 0.82em;
    }

    mjx-container {
      max-width: 100%;
      overflow: visible;
    }

    mjx-container[jax="SVG"] {
      display: inline-block;
      vertical-align: -0.08em;
    }

    td mjx-container[jax="SVG"],
    th mjx-container[jax="SVG"] {
      max-width: 100%;
      font-size: 0.93em;
    }

    .math-cell mjx-container[jax="SVG"] {
      display: block;
      margin: 0 auto;
      vertical-align: 0;
    }

    mjx-container[jax="SVG"][display="true"] {
      display: block;
      margin: 0.45em 0;
      overflow: visible;
      text-align: left !important;
    }

    /* Thermal clarity (mirrors desktop): fatten MathJax formula glyphs + fraction
       bars, and bold small table-cell CJK, so thin strokes survive 384px thermal
       printing. Stroke is non-scaling so it stays a constant hairline regardless of
       the SVG scale. */
    mjx-container[jax="SVG"] svg path,
    mjx-container[jax="SVG"] svg rect,
    mjx-container[jax="SVG"] svg line {
      stroke: currentColor;
      stroke-width: 0.5px;
      vector-effect: non-scaling-stroke;
    }

    td {
      font-weight: 600;
    }

    svg {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: false,
      breaks: false
    });
    const containerClasses = {
      left: 'align-left',
      center: 'align-center',
      right: 'align-right',
      justify: 'align-justify',
      'font-sm': 'font-sm',
      'font-md': 'font-md',
      'font-lg': 'font-lg',
      'font-xl': 'font-xl'
    };
    Object.keys(containerClasses).forEach(name => installContainerRule(md, name, containerClasses[name]));
    let activeRenderRequestId = 0;
    let renderQueue = Promise.resolve();

    function installContainerRule(markdown, name, className) {
      function container(state, startLine, endLine, silent) {
        let start = state.bMarks[startLine] + state.tShift[startLine];
        let max = state.eMarks[startLine];
        const opening = state.src.slice(start, max).trim();
        if (opening !== '::: ' + name && opening !== ':::' + name) return false;
        if (silent) return true;

        let nextLine = startLine + 1;
        while (nextLine < endLine) {
          start = state.bMarks[nextLine] + state.tShift[nextLine];
          max = state.eMarks[nextLine];
          if (state.src.slice(start, max).trim() === ':::') break;
          nextLine++;
        }

        const oldParent = state.parentType;
        const oldLineMax = state.lineMax;
        state.parentType = 'container';
        state.lineMax = nextLine;
        const open = state.push('miao_' + name + '_open', 'div', 1);
        open.block = true;
        open.map = [startLine, nextLine];
        open.attrSet('class', className);
        state.md.block.tokenize(state, startLine + 1, nextLine);
        const close = state.push('miao_' + name + '_close', 'div', -1);
        close.block = true;
        state.parentType = oldParent;
        state.lineMax = oldLineMax;
        state.line = nextLine < endLine ? nextLine + 1 : nextLine;
        return true;
      }
      markdown.block.ruler.before('fence', 'miao_' + name, container, {
        alt: ['paragraph', 'reference', 'blockquote', 'list']
      });
    }

    function pageHeight() {
      const content = document.getElementById('content');
      return Math.max(1, Math.ceil(content.getBoundingClientRect().height));
    }

    function protectPipesInMathSpans(segment) {
      const delims = [['$$', '$$'], ['$', '$']];
      let out = '';
      let i = 0;
      while (i < segment.length) {
        let matched = false;
        for (let d = 0; d < delims.length; d++) {
          const open = delims[d][0];
          const close = delims[d][1];
          if (segment.substr(i, open.length) === open) {
            const start = i + open.length;
            const end = segment.indexOf(close, start);
            if (end !== -1) {
              const math = segment.slice(start, end).replace(/(^|[^\\])\|/g, '$1{\\vert}');
              out += open + math + close;
              i = end + close.length;
              matched = true;
              break;
            }
          }
        }
        if (!matched) { out += segment[i]; i++; }
      }
      return out;
    }

    // A bare '|' inside $...$ on a table row is eaten by markdown-it's table parser
    // and shatters the formula. Escape in-math pipes to {\vert} before parsing.
    function protectTablePipesInMath(source) {
      let fence = '';
      return source.split('\n').map(function (line) {
        const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
        if (fenceMatch) {
          const marker = fenceMatch[1][0];
          fence = fence ? (fence === marker ? '' : fence) : marker;
          return line;
        }
        if (fence || line.indexOf('|') < 0) return line;
        return protectPipesInMathSpans(line);
      }).join('\n');
    }

    function normalizeMarkdown(source) {
      const safeSource = normalizeAlternateMathDelimiters(String(source || '')
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<script\b[^>]*>/gi, ''));
      return protectTablePipesInMath(normalizeMathFences(safeSource)
        .replace(/^(\s*)-\s+\[\s\]\s+/gm, '$1- \u2610 ')
        .replace(/^(\s*)-\s+\[[xX]\]\s+/gm, '$1- \u2611 '));
    }

    function normalizeMathFences(source) {
      return source.replace(
        /^(?:`{3,}|~{3,})math\s*\n([\s\S]*?)\n(?:`{3,}|~{3,})\s*$/gmi,
        function (_match, formula) {
          return '$$\n' + formula.trim() + '\n$$';
        }
      );
    }

    function normalizeAlternateMathDelimiters(source) {
      let fence = '';
      return source.split('\n').map(line => {
        const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
        if (fenceMatch) {
          const marker = fenceMatch[1][0];
          fence = fence ? (fence === marker ? '' : fence) : marker;
          return line;
        }
        if (fence) return line;
        return mapOutsideInlineCode(line, text => text
          .replace(/\\\(/g, '$')
          .replace(/\\\)/g, '$')
          .replace(/\\\[/g, '$$')
          .replace(/\\\]/g, '$$'));
      }).join('\n');
    }

    function mapOutsideInlineCode(line, transform) {
      let output = '';
      let cursor = 0;
      while (cursor < line.length) {
        const open = line.indexOf('`', cursor);
        if (open < 0) {
          output += transform(line.slice(cursor));
          break;
        }
        output += transform(line.slice(cursor, open));
        let markerEnd = open;
        while (markerEnd < line.length && line[markerEnd] === '`') markerEnd++;
        const marker = line.slice(open, markerEnd);
        const close = line.indexOf(marker, markerEnd);
        if (close < 0) {
          output += line.slice(open);
          break;
        }
        output += line.slice(open, close + marker.length);
        cursor = close + marker.length;
      }
      return output;
    }

    function renderDocument(source) {
      const definitions = new Map();
      let fence = '';
      const bodyLines = source.split('\n').filter(line => {
        const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
        if (fenceMatch) {
          const marker = fenceMatch[1][0];
          fence = fence ? (fence === marker ? '' : fence) : marker;
          return true;
        }
        if (fence) return true;
        const match = line.match(/^\[\^([^\]]+)\]:\s*(.+)$/);
        if (!match) return true;
        definitions.set(match[1], match[2]);
        return false;
      });
      const used = [];
      fence = '';
      const body = bodyLines.map(line => {
        const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
        if (fenceMatch) {
          const marker = fenceMatch[1][0];
          fence = fence ? (fence === marker ? '' : fence) : marker;
          return line;
        }
        if (fence) return line;
        return mapOutsideInlineCode(line, text => text.replace(/\[\^([^\]]+)\]/g, function (match, id) {
          if (!definitions.has(id)) return match;
          let index = used.indexOf(id);
          if (index < 0) {
            used.push(id);
            index = used.length - 1;
          }
          return '<sup class="footnote-ref">[' + (index + 1) + ']</sup>';
        }));
      }).join('\n');
      let html = md.render(body);
      if (!used.length) return html;
      html += '<section class="footnotes"><ol>';
      used.forEach(id => {
        html += '<li>' + md.renderInline(definitions.get(id)) + '</li>';
      });
      return html + '</ol></section>';
    }

    function cellText(cell) {
      return (cell && cell.textContent ? cell.textContent : '').replace(/\s+/g, ' ').trim();
    }

    function isActiveRequest(requestId) {
      return requestId === activeRenderRequestId;
    }

    function settleLayout() {
      return new Promise(resolve => {
        requestAnimationFrame(() => {
          requestAnimationFrame(resolve);
        });
      });
    }

    function tableColumnCount(table) {
      return Array.from(table.querySelectorAll('tr'))
        .reduce((max, row) => Math.max(max, row.children.length), 0);
    }

    function tableHasComplexContent(table) {
      return !!(table && table.querySelector('mjx-container, code, pre'));
    }

    function hasHorizontalOverflow(node) {
      if (!node) return false;
      if (node.scrollWidth - node.clientWidth > 2) return true;
      return Array.from(node.querySelectorAll('th, td, mjx-container, svg')).some(child => {
        const parent = child.parentElement;
        if (!parent) return false;
        return child.getBoundingClientRect().width - parent.getBoundingClientRect().width > 2;
      });
    }

    function markMathCells(root) {
      Array.from(root.querySelectorAll('th, td')).forEach(cell => {
        cell.classList.remove('math-cell');
        const math = cell.children.length === 1 ? cell.children[0] : null;
        if (!math || math.tagName !== 'MJX-CONTAINER') return;
        const onlyMath = Array.from(cell.childNodes).every(node => {
          return node === math || (node.nodeType === Node.TEXT_NODE && !node.textContent.trim());
        });
        if (onlyMath) {
          cell.classList.add('math-cell');
        }
      });
    }

    function shrinkTableToFit(table) {
      const fontSteps = tableHasComplexContent(table)
        ? [0.8, 0.76, 0.72, 0.68, 0.64]
        : [0.82, 0.78, 0.74, 0.7, 0.66];
      for (const size of fontSteps) {
        table.style.fontSize = size.toFixed(2) + 'em';
        fitMath(table, 0.72);
        if (!hasHorizontalOverflow(table)) {
          return true;
        }
      }
      return !hasHorizontalOverflow(table);
    }

    function shouldStackTable(table) {
      const colCount = tableColumnCount(table);
      if (colCount <= 1) return false;
      if (shrinkTableToFit(table)) return false;
      return colCount >= 2;
    }

    function stackWideTables(root) {
      Array.from(root.querySelectorAll('table')).forEach(table => {
        if (!shouldStackTable(table)) return;
        const headerRow = table.tHead && table.tHead.rows.length ? table.tHead.rows[0] : table.rows[0];
        if (!headerRow) return;
        const headerCells = Array.from(headerRow.cells);
        const headers = headerCells.map(cell => cellText(cell));
        const bodyRows = table.tBodies.length
          ? Array.from(table.tBodies).reduce((rows, section) => rows.concat(Array.from(section.rows)), [])
          : Array.from(table.rows).slice(1);
        const maxColumns = bodyRows.reduce((max, row) => Math.max(max, row.cells.length), 0);
        if (!bodyRows.length || maxColumns !== headers.length) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'stack-table';

        bodyRows.forEach(row => {
          const rowBox = document.createElement('div');
          rowBox.className = 'stack-row';
          Array.from(row.children).forEach((cell, index) => {
            const field = document.createElement('div');
            field.className = 'stack-field';
            const keyText = headers[index] || '';
            if (keyText) {
              const key = document.createElement('span');
              key.className = 'stack-key';
              key.textContent = keyText + ': ';
              field.appendChild(key);
            }
            const value = document.createElement('span');
            value.innerHTML = cell.innerHTML;
            field.appendChild(value);
            rowBox.appendChild(field);
          });
          wrapper.appendChild(rowBox);
        });

        MathJax.typesetClear([table]);
        table.replaceWith(wrapper);
      });
    }

    function fitMath(root, minimumScale) {
      const minimum = typeof minimumScale === 'number' ? minimumScale : 0.35;
      Array.from(root.querySelectorAll('mjx-container[jax="SVG"]')).forEach(node => {
        const svg = node.querySelector('svg');
        if (!svg) return;
        node.style.fontSize = '';
        svg.style.width = '';
        svg.style.height = '';
        const parentWidth = Math.max(40, node.parentElement ? node.parentElement.clientWidth : 340);
        const box = svg.getBoundingClientRect();
        if (box.width > parentWidth) {
          const scale = Math.max(minimum, parentWidth / box.width);
          node.style.fontSize = (scale * 100).toFixed(1) + '%';
          if (svg.getBoundingClientRect().width > parentWidth) {
            svg.style.width = '100%';
            svg.style.height = 'auto';
          }
        }
      });
    }

    function waitForImages(root) {
      const pending = Array.from(root.querySelectorAll('img'))
        .filter(image => !image.complete)
        .map(image => new Promise(resolve => {
          const done = () => resolve();
          image.addEventListener('load', done, {once: true});
          image.addEventListener('error', done, {once: true});
          setTimeout(done, 1500);
        }));
      return Promise.all(pending);
    }

    function sanitizeRenderedHtml(root) {
      root.querySelectorAll('script, iframe, object, embed, style, link, meta').forEach(node => node.remove());
      root.querySelectorAll('*').forEach(node => {
        Array.from(node.attributes).forEach(attribute => {
          const name = attribute.name.toLowerCase();
          const value = attribute.value.trim().toLowerCase();
          if (name.startsWith('on')
              || ((name === 'href' || name === 'src') && value.startsWith('javascript:'))) {
            node.removeAttribute(attribute.name);
          }
        });
      });
    }

    function performRender(source, textPx, requestId) {
      if (!isActiveRequest(requestId)) return Promise.resolve('__STALE__');
      document.body.style.fontSize = String(textPx || 19) + 'px';
      const content = document.getElementById('content');
      const normalized = normalizeMarkdown(source);
      MathJax.typesetClear([content]);
      content.innerHTML = renderDocument(normalized);
      sanitizeRenderedHtml(content);

      return MathJax.startup.promise
        .then(function () {
          if (!isActiveRequest(requestId)) return '__STALE__';
          return MathJax.typesetPromise([content]);
        })
        .then(function () {
          if (!isActiveRequest(requestId)) return '__STALE__';
          markMathCells(content);
          stackWideTables(content);
          markMathCells(content);
          fitMath(content);
          return waitForImages(content);
        })
        .then(function () {
          if (!isActiveRequest(requestId)) return '__STALE__';
          return settleLayout();
        })
        .then(function () {
          if (!isActiveRequest(requestId)) return '__STALE__';
          const mathErrors = content.querySelectorAll('[data-mml-node="merror"], mjx-merror');
          if (mathErrors.length) {
            return '__ERROR__:有 ' + mathErrors.length + ' 处公式无法解析';
          }
          return String(pageHeight());
        })
        .catch(function (error) {
          if (!isActiveRequest(requestId) || (error && error.message === '__STALE__')) {
            return '__STALE__';
          }
          return '__ERROR__:' + (error && error.message ? error.message : '公式渲染失败');
        });
    }

    window.renderMarkdown = function renderMarkdown(source, textPx, requestId) {
      activeRenderRequestId = requestId || 0;
      renderQueue = renderQueue
        .catch(function () { return ''; })
        .then(function () {
          return performRender(source, textPx, requestId);
        });
      return renderQueue;
    };
  </script>
</body>
</html>
